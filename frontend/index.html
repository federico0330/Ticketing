<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tickets VIP - Reservas</title>
    <!-- Modern Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <main id="app-container" data-sys-render="auto">
        <header class="app-header">
            <h1>🎫 VIP Tickets</h1>
            <p>Selecciona tu evento y asegura tus lugares.</p>
        </header>

        <section id="events-section">
            <h2>Catálogo de Eventos</h2>
            <div id="events-list" class="events-grid">
                <!-- Se poblará vía JS -->
            </div>

            <div class="pagination-controls">
                <button id="btn-prev-page" disabled>Anterior</button>
                <span id="page-indicator">Página 1</span>
                <button id="btn-next-page">Siguiente</button>
            </div>
        </section>

        <section id="sectors-section" class="hidden">
            <button id="btn-back" class="btn-secondary">← Volver al catálogo</button>
            <h2 id="current-event-title">Sectores</h2>
            <div id="sectors-list" class="sectors-grid">
                <!-- Se poblará vía JS -->
            </div>
        </section>

        <section id="seats-section" class="hidden">
            <button id="btn-back-seats" class="btn-secondary">← Volver a sectores</button>
            <h3 id="current-sector-title">Asientos del Sector</h3>
            <div class="legend">
                <span class="legend-item">
                    <div class="seat-badge available"></div> Disponible
                </span>
                <span class="legend-item">
                    <div class="seat-badge reserved"></div> Reservado
                </span>
                <span class="legend-item">
                    <div class="seat-badge sold"></div> Vendido
                </span>
            </div>

            <div class="stage-indicator">ESCENARIO</div>

            <div id="seat-map" class="seat-map">
                <!-- Se poblará vía JS -->
            </div>
        </section>
    </main>
    <div id="notification-container"></div>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
